<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WL Leads - Painel de Controle</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            justify-content: flex-start; 
            flex-direction: column; 
            padding: 40px 20px;
            background-color: #0a0c10;
        }
        .admin-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 255, 255, 0.1);
            border-radius: 8px;
            padding: 20px;
            overflow-x: auto;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 20px; 
            color: #e0e0e0;
        }
        th, td { 
            padding: 15px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            text-align: left; 
        }
        th { 
            background: rgba(0, 255, 255, 0.1); 
            color: var(--cyan); 
            font-family: 'Rajdhani', sans-serif;
            text-transform: uppercase;
        }
        .badge { 
            padding: 4px 8px; 
            border-radius: 4px; 
            font-size: 0.8rem; 
            font-weight: bold; 
        }
        .critico { background: #FF4444; color: white; }
        .aplus { background: #00FF00; color: black; }
        
        .refresh-btn {
            background: var(--ambar);
            color: black;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            margin-bottom: 20px;
            font-family: 'Rajdhani', sans-serif;
        }
        #loginArea {
            text-align: center;
            margin-top: 100px;
        }
        #mainContent {
            display: none; /* Escondido por padrão */
        }
    </style>
</head>
<body>

    <div id="loginArea">
        <h2 style="color: var(--cyan);">Acesso Restrito</h2>
        <p style="color: #888;">Digite a senha de administrador</p>
        <input type="password" id="passInput" style="padding: 10px; border-radius: 4px; border: 1px solid var(--cyan); background: #000; color: #fff; margin-top: 10px;">
        <button onclick="verificarSenha()" class="refresh-btn" style="margin-top: 10px;">Entrar</button>
    </div>

    <div id="mainContent" class="container" style="max-width: 1100px;">
        <h2 style="color: var(--cyan); margin-bottom: 5px;">🚀 WL Leads</h2>
        <p style="margin-bottom: 30px;">Base de Inteligência Longo Shield</p>
        
        <button class="refresh-btn" onclick="carregarLeads()">🔄 Atualizar Base</button>

        <div class="admin-card">
            <table>
                <thead>
                    <tr>
                        <th>Data/Hora</th>
                        <th>Domínio Consultado</th>
                        <th>Status</th>
                        <th>Localização</th>
                        <th>IP do Prospect</th>
                    </tr>
                </thead>
                <tbody id="tabelaLeads">
                    <tr><td colspan="5" style="text-align: center;">Carregando dados...</td></tr>
                </tbody>
            </table>
        </div>
        <button onclick="logout()" style="background:none; border:none; color:#555; cursor:pointer; margin-top:20px; text-decoration:underline;">Sair do Painel</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://giikoiqpnzgmhcqiuvhs.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_dtsJRRjhIKGt3OMakg4gUQ_4K0LviLB';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Verifica se já logou antes
        window.onload = () => {
            if (localStorage.getItem('longo_shield_admin') === 'true') {
                mostrarPainel();
            }
        };

        function verificarSenha() {
            const senha = document.getElementById('passInput').value;
            if (senha === 'longo2026') {
                localStorage.setItem('longo_shield_admin', 'true');
                mostrarPainel();
            } else {
                alert("Senha incorreta!");
            }
        }

        function mostrarPainel() {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            carregarLeads();
        }

        function logout() {
            localStorage.removeItem('longo_shield_admin');
            location.reload();
        }

        async function carregarLeads() {
            const corpoTabela = document.getElementById('tabelaLeads');
            
            const { data, error } = await _supabase
                .from('leads')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                corpoTabela.innerHTML = `<tr><td colspan="5" style="color: red;">Erro: ${error.message}</td></tr>`;
                return;
            }

            corpoTabela.innerHTML = '';
            data.forEach(lead => {
                const dataHora = new Date(lead.created_at).toLocaleString('pt-BR');
                const classeScore = lead.score === 'A+' ? 'aplus' : 'critico';
                
                corpoTabela.innerHTML += `
                    <tr>
                        <td style="font-size: 0.85rem; color: #888;">${dataHora}</td>
                        <td style="font-weight: bold; color: var(--cyan); font-size: 1.1rem;">${lead.dominio}</td>
                        <td><span class="badge ${classeScore}">${lead.score}</span></td>
                        <td>${lead.localizacao}</td>
                        <td style="font-family: monospace; color: #666;">${lead.ip_usuario}</td>
                    </tr>
                `;
            });
        }
    </script>
</body>
</html>
